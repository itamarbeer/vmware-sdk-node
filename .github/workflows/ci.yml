name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: packages/vsphere-client
        run: npm ci

      - name: Lint
        working-directory: packages/vsphere-client
        run: npm run lint

      - name: Type check
        working-directory: packages/vsphere-client
        run: npm run typecheck

      - name: Test
        working-directory: packages/vsphere-client
        run: npm run test

      - name: Build
        working-directory: packages/vsphere-client
        run: npm run build
